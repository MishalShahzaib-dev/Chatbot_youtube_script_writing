<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScriptForge — YouTube Shorts AI Writer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #ff2d2d;
      --red-dim: #cc0000;
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --surface3: #222222;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-dim: #888;
      --accent: #ff2d2d;
      --glow: 0 0 20px rgba(255,45,45,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--red);
      line-height: 1;
      margin-bottom: 4px;
    }

    .logo-sub {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .api-section {
      margin-bottom: 28px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      display: block;
    }

    .api-input-wrap {
      position: relative;
    }

    .api-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 10px 36px 10px 12px;
      border-radius: 6px;
      outline: none;
      transition: border 0.2s;
    }

    .api-input:focus { border-color: var(--red); }

    .eye-btn {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      padding: 2px;
    }

    .nav-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: block;
    }

    .categories {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      text-align: left;
    }

    .cat-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .cat-btn.active {
      background: rgba(255,45,45,0.1);
      border-color: rgba(255,45,45,0.3);
      color: var(--red);
    }

    .cat-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      background: var(--surface3);
      flex-shrink: 0;
    }

    .cat-btn.active .cat-icon { background: rgba(255,45,45,0.15); }

    .token-info {
      margin-top: 24px;
      padding: 12px;
      background: var(--surface2);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .token-info p {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .token-bar-bg {
      height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      overflow: hidden;
    }

    .token-bar {
      height: 100%;
      background: var(--red);
      border-radius: 2px;
      width: 0%;
      transition: width 0.6s ease;
    }

    .token-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
    }

    /* Main */
    .main {
      margin-left: 280px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 28px 40px 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .category-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 3px;
      line-height: 1;
      color: var(--text);
    }

    .category-title span { color: var(--red); }

    .category-desc {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 0;
    }

    .empty-icon {
      font-size: 56px;
      opacity: 0.15;
    }

    .empty-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    .empty-sub {
      font-size: 13px;
      color: var(--text-dim);
      opacity: 0.6;
    }

    /* Messages */
    .message {
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-user {
      display: flex;
      justify-content: flex-end;
    }

    .msg-user .bubble {
      background: var(--red);
      color: white;
      padding: 12px 16px;
      border-radius: 16px 16px 4px 16px;
      max-width: 70%;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg-ai { display: flex; gap: 12px; }

    .ai-avatar {
      width: 36px;
      height: 36px;
      background: rgba(255,45,45,0.15);
      border: 1px solid rgba(255,45,45,0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .ai-content { flex: 1; }

    .ai-name {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .script-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .script-card-header {
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .script-tag {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .copy-btn {
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .copy-btn:hover { color: var(--text); border-color: var(--red); }

    .script-body {
      padding: 20px;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    .script-body strong,
    .script-section-label {
      color: var(--red);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 16px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 20px 40px 28px;
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 12px 12px 16px;
      transition: border 0.2s;
    }

    .input-wrap:focus-within { border-color: var(--red); box-shadow: var(--glow); }

    .topic-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: none;
      min-height: 22px;
      max-height: 120px;
      line-height: 1.5;
    }

    .topic-input::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 40px;
      height: 40px;
      background: var(--red);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 18px;
    }

    .send-btn:hover { background: var(--red-dim); transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      text-align: center;
    }

    /* Error toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #2a0a0a;
      border: 1px solid var(--red);
      color: var(--text);
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 9999;
      animation: toastIn 0.3s ease;
      max-width: 320px;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Mobile */
    @media (max-width: 768px) {
      .sidebar { width: 100%; position: relative; height: auto; }
      .main { margin-left: 0; }
      .categories { flex-direction: row; flex-wrap: wrap; }
      .chat-area { padding: 20px; }
      .input-area { padding: 16px 20px 20px; }
      .header { padding: 20px; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">ScriptForge</div>
  <div class="logo-sub">AI YouTube Shorts Writer</div>

  <div class="api-section">
    <span class="label">OpenRouter API Key</span>
    <div class="api-input-wrap">
      <input type="password" class="api-input" id="apiKey" placeholder="sk-or-v1-..." />
      <button class="eye-btn" onclick="toggleKey()" id="eyeBtn">👁</button>
    </div>
  </div>

  <span class="nav-label">Script Categories</span>

  <div class="categories">
    <button class="cat-btn active" onclick="selectCat('horror', this)">
      <div class="cat-icon">👻</div>
      <div>
        <div>Horror Stories</div>
      </div>
    </button>
    <button class="cat-btn" onclick="selectCat('educational', this)">
      <div class="cat-icon">📚</div>
      <div>Educational</div>
    </button>
    <button class="cat-btn" onclick="selectCat('shorts', this)">
      <div class="cat-icon">⚡</div>
      <div>Viral Shorts</div>
    </button>
    <button class="cat-btn" onclick="selectCat('hooks', this)">
      <div class="cat-icon">🎣</div>
      <div>Hooks & Titles</div>
    </button>
    <button class="cat-btn" onclick="selectCat('seo', this)">
      <div class="cat-icon">🔍</div>
      <div>SEO Description</div>
    </button>
  </div>

  <div class="token-info">
    <p>Token Usage</p>
    <div class="token-bar-bg">
      <div class="token-bar" id="tokenBar"></div>
    </div>
    <div class="token-text" id="tokenText">— / —</div>
  </div>
</aside>

<main class="main">
  <div class="header">
    <div class="category-title" id="catTitle">HORROR <span>STORIES</span></div>
    <div class="category-desc" id="catDesc">Creepy 60-second YouTube Shorts scripts with atmospheric narration</div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎬</div>
      <div class="empty-title">READY TO WRITE</div>
      <div class="empty-sub">Enter a topic and let AI craft your Short</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea class="topic-input" id="topicInput"
        placeholder="Enter your Short's topic or idea..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="generate()">▶</button>
    </div>
    <div class="input-hint">Press Enter to generate · Shift+Enter for new line</div>
  </div>
</main>

<script>
  const CAT_META = {
    horror: {
      title: 'HORROR <span>STORIES</span>',
      desc: 'Creepy 60-second YouTube Shorts scripts with atmospheric narration',
      placeholder: 'e.g. A haunted mirror that shows a different reflection...',
      icon: '👻'
    },
    educational: {
      title: 'EDUCATIONAL <span>SHORTS</span>',
      desc: 'Fast, clear, one-concept educational scripts for Shorts',
      placeholder: 'e.g. Why do we dream? The science explained...',
      icon: '📚'
    },
    shorts: {
      title: 'VIRAL <span>SHORTS</span>',
      desc: 'High-energy, shareable Shorts scripts built to go viral',
      placeholder: 'e.g. 5 things you did not know about your brain...',
      icon: '⚡'
    },
    hooks: {
      title: 'HOOKS <span>& TITLES</span>',
      desc: 'Powerful opening lines and clickable titles for any Short',
      placeholder: 'e.g. Horror Short about a cursed phone...',
      icon: '🎣'
    },
    seo: {
      title: 'SEO <span>DESCRIPTION</span>',
      desc: 'Keyword-rich descriptions and hashtags for YouTube Shorts',
      placeholder: 'e.g. Horror Short about a ghost in an old house...',
      icon: '🔍'
    }
  };

  let currentCat = 'horror';
  let isLoading = false;

  function selectCat(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const meta = CAT_META[cat];
    document.getElementById('catTitle').innerHTML = meta.title;
    document.getElementById('catDesc').textContent = meta.desc;
    document.getElementById('topicInput').placeholder = meta.placeholder;
  }

  function toggleKey() {
    const inp = document.getElementById('apiKey');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      generate();
    }
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  function appendUserMsg(text) {
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = 'message msg-user';
    div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
    document.getElementById('chatArea').appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message typing';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="ai-avatar">${CAT_META[currentCat].icon}</div>
      <div class="typing-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    document.getElementById('chatArea').appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function appendAiMsg(script, cat, tokensUsed, maxTokens) {
    const div = document.createElement('div');
    div.className = 'message msg-ai';
    div.innerHTML = `
      <div class="ai-avatar">${CAT_META[cat].icon}</div>
      <div class="ai-content">
        <div class="ai-name">ScriptForge AI</div>
        <div class="script-card">
          <div class="script-card-header">
            <span class="script-tag">${cat.toUpperCase()} · SHORTS</span>
            <button class="copy-btn" onclick="copyScript(this)">Copy Script</button>
          </div>
          <div class="script-body">${formatScript(script)}</div>
        </div>
      </div>`;
    document.getElementById('chatArea').appendChild(div);

    // Update token bar
    const pct = Math.min((tokensUsed / maxTokens) * 100, 100);
    document.getElementById('tokenBar').style.width = pct + '%';
    document.getElementById('tokenText').textContent = `${tokensUsed} / ${maxTokens} tokens`;

    scrollBottom();
  }

  function formatScript(text) {
    // Highlight section labels like TITLE:, HOOK:, SCRIPT:, etc.
    return escHtml(text).replace(
      /(TITLE\s*\d*:|HOOK\s*[\d\(\)\-\w]*:|SCRIPT:|CALL TO ACTION:|DESCRIPTION:|HASHTAGS:|TAGS:|HOOK \(\d+-\d+s\):)/g,
      '<strong>$1</strong>'
    );
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function copyScript(btn) {
    const body = btn.closest('.script-card').querySelector('.script-body');
    navigator.clipboard.writeText(body.innerText).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Script', 2000);
    });
  }

  function scrollBottom() {
    const area = document.getElementById('chatArea');
    area.scrollTop = area.scrollHeight;
  }

  async function generate() {
    if (isLoading) return;

    const apiKey = document.getElementById('apiKey').value.trim();
    const topic = document.getElementById('topicInput').value.trim();

    if (!apiKey) { showToast('Paste your OpenRouter API key first'); return; }
    if (!topic) { showToast('Enter a topic for your Short'); return; }

    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    const capturedCat = currentCat;
    appendUserMsg(topic);
    document.getElementById('topicInput').value = '';
    document.getElementById('topicInput').style.height = 'auto';

    showTyping();

    try {
      const res = await fetch('http://127.0.0.1:5000/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: apiKey, category: capturedCat, topic })
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        showToast('Error: ' + data.error);
      } else {
        appendAiMsg(data.script, capturedCat, data.tokens_used, data.max_tokens);
      }
    } catch (err) {
      removeTyping();
      showToast('Cannot connect to backend. Make sure app.py is running on port 5000.');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
</script>
</body>
</html>
